<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения! ❤️</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        
        #intro-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0b0005;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 1.5s;
        }

        #intro-overlay h1 {
            color: #ff2d75;
            font-size: clamp(2rem, 10vw, 3.5rem);
            text-shadow: 0 0 20px #ff2d75;
            animation: pulse 2s infinite;
        }

       
        #bg-slider {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .bg-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .bg-img.active { opacity: 0.5; }

       
        #final-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            opacity: 0; /* Изначально скрыто */
            transition: opacity 3s ease;
            pointer-events: none;
        }

        #heart-container {
            position: relative;
            width: min(90vw, 650px);
            height: min(90vw, 600px);
        }

        .love-text {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            text-transform: uppercase;
            animation: snakeFlow 3s infinite ease-in-out;
            color: #ff2d75;
            transform: translate(-50%, -50%);
        }

       
        #birthday-message {
            margin-top: 20px;
            text-align: center;
            color: white;
            padding: 0 20px;
            max-width: 600px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8), 0 0 20px #ff2d75;
            z-index: 11;
        }

        #birthday-message h2 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            margin-bottom: 10px;
            color: #ff2d75;
        }

        #birthday-message p {
            font-size: clamp(1rem, 4vw, 1.4rem);
            line-height: 1.5;
            font-style: italic;
        }

        @keyframes snakeFlow {
            0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); filter: blur(1px); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); filter: blur(0px); text-shadow: 0 0 15px #ff2d75; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 600px) {
            .love-text { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div id="intro-overlay" onclick="startApp()">
        <h1>для любимой)</h1>
    </div>

    <div id="bg-slider"></div>

    <div id="final-container">
        <div id="heart-container"></div>
        
        <div id="birthday-message">
            <h2>С Днём Рождения, солнышко! ❤️</h2>
            <p>
                В этот особенный день я хочу сказать, что ты — самое дорогое, что у меня есть. 
                Пусть твоя улыбка сияет ярче всех звёзд, а каждый миг будет наполнен счастьем. 
                Я всегда буду рядом. Люблю тебя бесконечно!
            </p>
        </div>
    </div>

<script>
   
    const photoFiles = ["2.jpg", "3.jpg", "4.jpg","5.jpg","6.jpg","7.jpg","8.jpg","9.jpg","10.jpg"]; 
    const slider = document.getElementById('bg-slider');
    const heartContainer = document.getElementById('heart-container');
    const finalContainer = document.getElementById('final-container');

  
    photoFiles.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = 'bg-img' + (index === 0 ? ' active' : '');
        div.style.backgroundImage = `url('./${file}')`;
        slider.appendChild(div);
    });

    
    function drawHeart() {
        heartContainer.innerHTML = '';
        const totalPoints = 55;
        const width = heartContainer.offsetWidth;
        const centerX = width / 2;
        const centerY = width / 2;
        const scale = width / 35;

        for (let i = 0; i < totalPoints; i++) {
            const span = document.createElement('span');
            span.className = 'love-text';
            span.innerText = "я люблю тебя";
            
            const t = (i / totalPoints) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

            span.style.left = (centerX + x * scale) + 'px';
            span.style.top = (centerY + y * scale) + 'px';
            span.style.animationDelay = (i * 0.05) + 's';
            heartContainer.appendChild(span);
        }
    }

    
    let currentSlide = 0;
    const slides = document.querySelectorAll('.bg-img');

    function switchSlide() {
        if (currentSlide < slides.length - 1) {
            slides[currentSlide].classList.remove('active');
            currentSlide++;
            slides[currentSlide].classList.add('active');

          
            if (currentSlide === slides.length - 1) {
                showFinal();
            }
        }
    }

    function showFinal() {
        finalContainer.style.opacity = '1';
    }

    function startApp() {
        document.getElementById('intro-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('intro-overlay').style.display = 'none';
            
            // Запускаем перелистывание каждые 4 секунды
            // Оно остановится само на последнем слайде
            const slideInterval = setInterval(() => {
                if (currentSlide < slides.length - 1) {
                    switchSlide();
                } else {
                    clearInterval(slideInterval);
                }
            }, 2000);

        }, 1000);
    }

    window.onload = drawHeart;
    window.onresize = drawHeart;
</script>
</body>
</html>
